name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  GO_VERSION: "1.25"

jobs:
  go:
    name: go build / vet / test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: itsm
          POSTGRES_PASSWORD: itsm
          POSTGRES_DB: itsm
        ports:
          - "5432:5432"
        options: >-
          --health-cmd "pg_isready -U itsm -d itsm"
          --health-interval 5s --health-timeout 3s --health-retries 10
    env:
      TEST_DATABASE_URL: postgres://itsm:itsm@localhost:5432/itsm?sslmode=disable
      TEST_NATS_URL: nats://localhost:4222
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: "**/go.sum"

      # NATS as a `docker run` (not a service container) so JetStream (-js) can
      # be enabled, which service containers cannot pass as an argument.
      - name: Start NATS (JetStream)
        run: docker run -d --name nats -p 4222:4222 nats:2.10-alpine -js

      - name: gofmt check
        run: |
          unformatted="$(gofmt -l $(git ls-files '*.go'))"
          if [ -n "$unformatted" ]; then
            echo "::error::These files are not gofmt-formatted:"
            echo "$unformatted"
            exit 1
          fi

      - name: go vet (all modules)
        run: |
          set -e
          for mod in $(git ls-files '**/go.mod' go.mod 2>/dev/null | xargs -r -n1 dirname | sort -u); do
            echo "== vet $mod =="
            (cd "$mod" && go vet ./...)
          done

      - name: go build (all modules)
        run: |
          set -e
          for mod in $(git ls-files '**/go.mod' go.mod 2>/dev/null | xargs -r -n1 dirname | sort -u); do
            echo "== build $mod =="
            (cd "$mod" && go build ./...)
          done

      - name: go test (all modules)
        run: |
          set -e
          for mod in $(git ls-files '**/go.mod' go.mod 2>/dev/null | xargs -r -n1 dirname | sort -u); do
            echo "== test $mod =="
            (cd "$mod" && go test ./... -race -count=1)
          done

  web:
    name: web typecheck / build / lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build
      - run: npm run lint
