# Cilium LB IPAM pool holding the dev anycast VIP. The gateway Service requests
# this address via the lbipam.cilium.io/ips annotation (see gateway-lb.yaml).
#
# apiVersion is version-dependent: cilium.io/v2alpha1 for Cilium 1.14–1.15,
# cilium.io/v2 for Cilium >= 1.16. Match your cluster's Cilium version.
apiVersion: cilium.io/v2alpha1
kind: CiliumLoadBalancerIPPool
metadata:
  name: itsm-dev
spec:
  blocks:
    - cidr: "2601:443:c200:575::60/128"
