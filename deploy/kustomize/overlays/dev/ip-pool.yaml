# Cilium LB IPAM pool for ITSM, following the cluster's per-service "*-anycast"
# convention (apiVersion cilium.io/v2 on this cluster). Holds the IPv4 edge VIP
# and the IPv6 anycast VIP; the gateway Service (matched by serviceSelector)
# requests them via the lbipam.cilium.io/ips annotation (see gateway-lb.yaml).
apiVersion: cilium.io/v2
kind: CiliumLoadBalancerIPPool
metadata:
  name: itsm-anycast
spec:
  blocks:
    - cidr: "10.10.10.60/32"
    - cidr: "2601:443:c200:575::60/128"
  serviceSelector:
    matchLabels:
      app.kubernetes.io/part-of: usg-itsm
