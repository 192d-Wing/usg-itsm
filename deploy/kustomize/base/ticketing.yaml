apiVersion: apps/v1
kind: Deployment
metadata:
  name: ticketing
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ticketing
  template:
    metadata:
      labels:
        app: ticketing
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: ticketing
          image: usg-itsm/ticketing:latest
          ports:
            - containerPort: 8445
          envFrom:
            - configMapRef:
                name: itsm-config
            - secretRef:
                name: itsm-secrets
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8445
              scheme: HTTPS
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: ticketing
spec:
  ipFamilyPolicy: SingleStack
  ipFamilies: [IPv6]
  selector:
    app: ticketing
  ports:
    - port: 8445
      targetPort: 8445
