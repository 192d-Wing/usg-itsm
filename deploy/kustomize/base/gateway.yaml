apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: gateway
          image: usg-itsm/gateway:latest
          ports:
            - containerPort: 8443
          envFrom:
            - configMapRef:
                name: itsm-config
            - secretRef:
                name: itsm-secrets
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8443
              scheme: HTTPS
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8443
              scheme: HTTPS
            initialDelaySeconds: 5
            periodSeconds: 15
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: gateway
spec:
  # Base is ClusterIP; the dev overlay promotes this to a LoadBalancer with the
  # Cilium anycast VIP.
  type: ClusterIP
  ipFamilyPolicy: SingleStack
  ipFamilies: [IPv6]
  selector:
    app: gateway
  ports:
    - name: https
      port: 8443
      targetPort: 8443
