apiVersion: v1
kind: ConfigMap
metadata:
  name: itsm-config
data:
  ENVIRONMENT: "dev"
  LOG_LEVEL: "info"
  # In-cluster service endpoints (IPv6-only network, ADR-0009).
  NATS_URL: "nats://nats:4222"
  DATABASE_SCHEMA: "ticketing"
  # OIDC: services validate tokens against this issuer and fetch its JWKS.
  # The issuer string must match the `iss` Keycloak puts in tokens, so it has
  # to be the browser-facing URL. See deploy/README for the Keycloak hostname
  # requirement.
  OIDC_ISSUER: "https://itsm.dev.mil/realms/usg-itsm"
  OIDC_AUDIENCE: "usg-itsm-web"
  # Gateway → ticketing upstream (TLS 1.3, dev self-signed accepted).
  TICKETING_URL: "https://ticketing:8445"
  # Gateway serves the SPA baked into its image.
  WEB_DIR: "/web"
---
apiVersion: v1
kind: Secret
metadata:
  name: itsm-secrets
type: Opaque
stringData:
  # DEV ONLY placeholders — replace with sealed-secrets / Vault for real use.
  POSTGRES_PASSWORD: "itsm"
  DATABASE_URL: "postgres://itsm:itsm@postgres:5432/itsm?sslmode=disable"
  KEYCLOAK_ADMIN_PASSWORD: "admin"
